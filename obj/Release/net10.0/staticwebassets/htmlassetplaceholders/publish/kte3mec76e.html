<script>
    // بيانات الربط (Config)
    const firebaseConfig = {
        databaseURL: "https://nawafappointments-default-rtdb.firebaseio.com/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // وظيفة حفظ الموعد في قاعدة البيانات
    window.saveToFirebase = (appointment) => {
        const newRef = db.ref('appointments').push();
        return newRef.set(appointment);
    };

    // وظيفة جلب كل المواعيد لعرضها في الجدول
    window.loadFromFirebase = async () => {
        const snapshot = await db.ref('appointments').once('value');
        const data = snapshot.val();
        if (!data) return [];
        return Object.values(data);
    };
</script>
